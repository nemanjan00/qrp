name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: lint · typecheck · test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # node --test with a glob pattern needs Node >= 21
        node: ["22", "24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
