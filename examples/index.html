<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>qrp demo</title>
	<style>
		:root { color-scheme: light dark; }
		body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
		nav a { margin-right: 1rem; }
		nav a.active { font-weight: bold; text-decoration: underline; }
		.setting-item { margin: 0.5rem 0; display: flex; flex-direction: column; gap: 0.2rem; }
		.description { font-size: 0.8rem; opacity: 0.7; }
		input, select, textarea { padding: 0.3rem; font: inherit; }
		textarea.textarea-input { width: 100%; min-height: 8rem; }
		h3 { margin: 1rem 0 0.3rem; }
		.live { padding: 0.5rem; border: 1px dashed currentColor; border-radius: 6px; }

		/* toasts */
		.qrp-toasts { position: fixed; top: 1rem; right: 1rem; display: flex; flex-direction: column; gap: .5rem; z-index: 1000; max-width: 320px; }
		.qrp-toast { display: flex; align-items: baseline; gap: .5rem; padding: .6rem .8rem; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,.2); color: #fff; }
		.qrp-toast-title { font-weight: 700; }
		.qrp-toast-body { flex: 1; }
		.qrp-toast-body a { color: #fff; }
		.qrp-toast-close { border: none; background: none; color: inherit; cursor: pointer; opacity: .7; font-size: 1rem; }
		.qrp-toast-close:hover { opacity: 1; }
		.qrp-toast-success { background: #2e7d32; }
		.qrp-toast-error   { background: #c62828; }
		.qrp-toast-info    { background: #1565c0; }
		.qrp-toast-warning { background: #ef6c00; }
	</style>
</head>
<body>
	<!-- No build step. Just modules. -->
	<h1>qrp <small style="opacity:.6">— a low-power frontend framework</small></h1>

	<!-- Plain <a href> links; the HTML5 router intercepts them. -->
	<nav>
		<a href="/examples/index.html">Home</a>
		<a href="/settings/user">Settings</a>
		<a href="/counter/3">Counter</a>
	</nav>

	<main id="view"></main>

	<hr>
	<p class="live">
		A real custom element (no classes were used):
		<qrp-clock></qrp-clock>
	</p>

	<script type="module">
		import { state, effect, el, define, mount } from "../qrp/index.js";
		import { form, textual, parseKV, registerInput, inputs } from "../forms/index.js";
		import { persisted } from "../browser/index.js";
		import { toasts, notify } from "../toasts/index.js";

		// Mount the toast stack once, near the root. Any code can now raise a
		// toast by calling notify.* (which emits on the global bus).
		mount(document.body, toasts.component);

		// Dynamically register a custom input type: an uppercasing text field.
		registerInput("callsign", (settings, key, field) => {
			const input = inputs.text(settings, key, field);
			input.addEventListener("input", () => { settings[key] = input.value.toUpperCase(); });
			return input;
		});

		// --- a custom element built on the real HTMLElement proto ----------
		define("qrp-clock", (host) => {
			const now = state({ t: new Date().toLocaleTimeString() });

			const timer = setInterval(() => {
				now.t = new Date().toLocaleTimeString();
			}, 1000);

			// effect() here is owned by the element's scope, but the interval
			// isn't — clean it on disconnect.
			host.addEventListener("qrp:disconnect", () => clearInterval(timer));

			host.appendChild(el("strong", {}, () => now.t));
		});

		// --- pages ---------------------------------------------------------
		const home = (view) => {
			const prefs = persisted("qrp-demo", { name: "Nemanja" });

			view.appendChild(el("div", {},
				el("h2", {}, "Two-way binding + persistence"),
				el("p", {}, "Type below; it survives reload and syncs across tabs."),
				el("input", { type: "text", bind: [prefs, "name"] }),
				el("p", {}, () => `Hello, ${prefs.name || "stranger"}!`),

				el("h2", {}, "Notifications via the global event pipe"),
				el("p", {}, "Any code can raise these by emitting on the bus."),
				el("button", { onclick: () => notify.success("Settings saved") }, "Success toast"),
				el("button", { onclick: () => notify.error("Could not reach the hotspot") }, "Error toast"),
				el("button", {
					// content can be a renderable, not just a string
					onclick: () => notify.error(el("span", {}, "Save failed — ",
						el("a", { href: "#" }, "see logs")))
				}, "Renderable toast")
			));
		};

		const counter = (view, ctx) => {
			const c = state({ n: Number(ctx.params.start) || 0 });

			view.appendChild(el("div", {},
				el("h2", {}, () => `Count: ${c.n}`),
				el("button", { onclick: () => c.n-- }, "-1"),
				el("button", { onclick: () => c.n++ }, "+1"),
				el("p", { class: "description" }, `started from route param :start = ${ctx.params.start}`)
			));
		};

		const settings = (view, ctx) => {
			const settingsState = state(parseKV("NICK=Nemanja\nCS=YT9XYZ\nID=123456"));

			// Declarative: fields name their input type as a string.
			const fields = {
				NICK: { name: "Nick", description: "Name, nickname, etc.", type: "text" },
				CS:   { name: "Callsign", description: "Your hamradio callsign (auto-uppercased)", type: "callsign" },
				ID:   { name: "DMR ID", type: "number" },
				EMAIL:{ name: "Email", type: "email", placeholder: "you@example.com", default: "" },
				VOL:  { name: "Volume", type: "range", min: 0, max: 10, step: 1, default: 5 },
				MODE: { name: "Mode", type: "select", options: { dmr: "DMR", ysf: "YSF" }, default: "dmr" }
			};

			const sections = [
				{ name: "User", filter: k => ["NICK", "CS", "ID"].includes(k) },
				{ name: "Other", filter: () => true }
			];

			view.appendChild(el("h2", {}, `Settings — ${ctx.params.section}`));
			view.appendChild(form({ fields, sections, settings: settingsState }));

			view.appendChild(el("h3", {}, "Textual mode (edits the SAME state, live)"));
			view.appendChild(textual(settingsState));
		};

		// --- router ---------------------------------------------------------
		// Routes match location.pathname. Serve this folder over HTTP
		// (e.g. `python -m http.server`) so the History API works, then open
		// /examples/index.html. Links navigate without a page reload.
		import { router } from "../qrp/index.js";

		const routes = {
			"/examples/index.html": home,
			"/settings/:section": settings,
			"/counter/:start": counter
		};

		router(routes, document.getElementById("view"));
	</script>
</body>
</html>
