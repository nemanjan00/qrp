; qrp settings dashboard on an ESP32 — PlatformIO project.
;
; Generate the embedded page first, then build/upload:
;   node build.js          ; -> src/dashboard_html_gz.h (PROGMEM blob)
;   pio run -t upload      ; compile + flash
;
; Works on any ESP32; for an ESP8266 swap the board/platform and use
; ESP8266WebServer + ESP8266WiFi in src/main.cpp.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
