<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>qrp • benchmark (paint-timed)</title>
	<style>
		/* so a selected row is visible AND forces real style/layout work */
		tr.danger td { background: #fdd; }
		body { font: 13px system-ui, sans-serif; }
		table { border-collapse: collapse; }
		td { padding: 2px 8px; border-bottom: 1px solid #eee; }
	</style>
</head>
<body>
	<div style="display:flex; gap:2rem">
		<div><h4>qrp</h4><div id="qrp-root"></div></div>
		<div><h4>vanilla</h4><div id="van-root"></div></div>
	</div>

	<script type="importmap">
		{
			"imports": {
				"@nemanjan00/qrp": "../qrp/index.js",
				"@nemanjan00/qrp/": "../",
				"@nemanjan00/qrp/html": "../html/index.js",
				"@nemanjan00/qrp/forms": "../forms/index.js",
				"@nemanjan00/qrp/table": "../table/index.js",
				"@nemanjan00/qrp/collection": "../collection/index.js",
				"@nemanjan00/qrp/http": "../http/index.js",
				"@nemanjan00/qrp/events": "../events/index.js",
				"@nemanjan00/qrp/toasts": "../toasts/index.js",
				"@nemanjan00/qrp/browser": "../browser/index.js",
				"@nemanjan00/qrp/proto": "../proto/index.js",
				"@nemanjan00/qrp/behaviors/portal": "../behaviors/portal.js",
				"@nemanjan00/qrp/behaviors/dismissable": "../behaviors/dismissable.js",
				"@nemanjan00/qrp/behaviors/trap-focus": "../behaviors/trap-focus.js",
				"@nemanjan00/qrp/behaviors/anchored": "../behaviors/anchored.js",
				"@nemanjan00/qrp/behaviors/disclosure": "../behaviors/disclosure.js",
				"@nemanjan00/qrp/behaviors/busy-while": "../behaviors/busy-while.js",
				"@nemanjan00/qrp/utils": "../utils/index.js",
				"@nemanjan00/qrp/utils/memoize": "../utils/memoize.js",
				"@nemanjan00/qrp/utils/lru": "../utils/lru.js",
				"@nemanjan00/qrp/utils/cache": "../utils/cache.js",
				"@nemanjan00/qrp/utils/paginate": "../utils/paginate.js"
			}
		}
	</script>
	<script type="module">
		import { state, el, list, mount, clear } from "@nemanjan00/qrp";

		// --- data -----------------------------------------------------------
		let seq = 1;
		const A = ["pretty", "large", "big", "small", "tall", "short", "long", "handsome", "plain", "quaint", "clean", "elegant", "easy", "angry", "crazy", "helpful", "mushy", "odd", "unsightly", "adorable"];
		const N = ["table", "chair", "house", "bbq", "desk", "car", "pony", "cookie", "sandwich", "burger", "pizza", "mouse", "keyboard"];
		let r = 999;
		const rnd = (m) => { r = (r * 48271) % 2147483647; return r % m; };
		const buildData = (n) => Array.from({ length: n }, () => ({ id: seq++, label: A[rnd(A.length)] + " " + N[rnd(N.length)] }));

		// --- paint-timed stopwatch: return time until the frame is painted ---
		const timed = async (fn) => {
			const t = performance.now();
			fn();
			await new Promise((resolve) => requestAnimationFrame(() => setTimeout(resolve, 0)));
			return performance.now() - t;
		};

		// --- setup/run/teardown runner: warmup discard + reset each rep ------
		const runBench = async ({ setup, run }, { reps = 5, warmup = 2 } = {}) => {
			const times = [];

			for(let i = 0; i < warmup + reps; i++) {
				if(setup) { await new Promise((res) => { setup(); requestAnimationFrame(() => setTimeout(res, 0)); }); }

				const ms = await timed(run);

				if(i >= warmup) { times.push(ms); }
			}

			times.sort((a, b) => a - b);

			return Math.round(times[Math.floor(times.length / 2)] * 10) / 10;
		};

		// ==================================================================
		// qrp implementation
		// ==================================================================
		let qTick = 0;
		const qrp = (() => {
			const store = state({ rows: [] });
			const selected = state({ id: 0 });

			mount(document.getElementById("qrp-root"), (view) => {
				view.appendChild(el("table", {}, el("tbody", {}, list(
					() => store.rows,
					(row) => row.id,
					(row) => el("tr", { class: () => (selected.id === row.id ? "danger" : "") },
						el("td", {}, () => row.id),
						el("td", {}, () => row.label),
						el("td", {}, "x")
					)
				))));
			});

			return {
				setRows: (data) => { store.rows = data; },
				create: (n) => { store.rows = buildData(n); },                       // build INCLUDED (jsfwbench-style)
				assignPrebuilt: (data) => { store.rows = data; },                     // build HOISTED (pure diff)
				append: (n) => { store.rows = [...store.rows, ...buildData(n)]; },
				update10th: () => { const rows = store.rows; for(let i = 0; i < rows.length; i += 10) { rows[i].label += " !!!"; } },
				// THE headline op: change ONE field in a huge table. Mutating the
				// row's reactive property fires exactly one text-node effect — no
				// list re-run, no diff. This is the categorical difference from a
				// virtual-DOM framework (which re-runs a component + reconciles).
				// Assign a small CHANGING value (not += growth, which would time
				// O(n) string concat instead of the update path).
				updateOne: () => { const mid = Math.floor(store.rows.length / 2); store.rows[mid].label = "v" + (qTick++); },
				// realistic single-cell update: you hold the row (e.g. from an
				// event handler). Mutating it fires one effect that writes the one
				// text node the subscription already references — no lookup at all.
				prepUpdateOne: () => { const row = store.rows[Math.floor(store.rows.length / 2)]; return () => { row.label = "v" + (qTick++); }; },
				select: () => { selected.id = store.rows.length ? store.rows[Math.floor(store.rows.length / 2)].id : 0; },
				swap: () => { const a = store.rows.slice(); if(a.length > 3) { const t = a[1]; a[1] = a[a.length - 2]; a[a.length - 2] = t; } store.rows = a; },
				remove: () => { store.rows = store.rows.filter((_, i) => i !== 1); },
				clear: () => { store.rows = []; },
				count: () => document.querySelectorAll("#qrp-root tr").length
			};
		})();

		// ==================================================================
		// vanilla control — a hand-written KEYED table (the floor)
		// ==================================================================
		let vTick = 0;
		const vanilla = (() => {
			const root = document.getElementById("van-root");
			const table = document.createElement("table");
			const tbody = document.createElement("tbody");
			table.appendChild(tbody);
			root.appendChild(table);

			let rows = [];
			let selectedTr = null;
			const byId = new Map(); // id -> { tr, labelNode, data }

			const makeTr = (row) => {
				const tr = document.createElement("tr");
				tr.id = "v" + row.id;                        // so a query can find it
				const idTd = document.createElement("td"); idTd.textContent = row.id;
				const labelTd = document.createElement("td"); labelTd.className = "label"; labelTd.textContent = row.label;
				const actionTd = document.createElement("td"); actionTd.textContent = "x";
				tr.append(idTd, labelTd, actionTd);
				byId.set(row.id, { tr, labelNode: labelTd, data: row });
				return tr;
			};

			const renderAll = (data) => {
				byId.clear(); selectedTr = null;
				const frag = document.createDocumentFragment();
				data.forEach((row) => frag.appendChild(makeTr(row)));
				tbody.replaceChildren(frag);
				rows = data;
			};

			return {
				setRows: renderAll,
				create: (n) => renderAll(buildData(n)),
				assignPrebuilt: (data) => renderAll(data),
				append: (n) => {
					const data = buildData(n);
					const frag = document.createDocumentFragment();
					data.forEach((row) => frag.appendChild(makeTr(row)));
					tbody.appendChild(frag);
					rows = [...rows, ...data];
				},
				update10th: () => { for(let i = 0; i < rows.length; i += 10) { rows[i].label += " !!!"; byId.get(rows[i].id).labelNode.textContent = rows[i].label; } },
				// hand-written optimum: find the one label node, set textContent
				updateOne: () => { const row = rows[Math.floor(rows.length / 2)]; row.label = "v" + (vTick++); byId.get(row.id).labelNode.textContent = row.label; },
				// vanilla holding a DIRECT node ref (the absolute floor — you kept
				// your own id→node map). qrp gives this class of speed for free.
				prepUpdateOne: () => { const row = rows[Math.floor(rows.length / 2)]; const node = byId.get(row.id).labelNode; return () => { node.textContent = "v" + (vTick++); }; },
				// vanilla that has to FIND the cell each time (querySelector) — the
				// realistic case when you don't hoard node references.
				prepUpdateOneQuery: () => { const row = rows[Math.floor(rows.length / 2)]; const sel = "#v" + row.id + " .label"; return () => { tbody.parentNode.querySelector(sel).textContent = "v" + (vTick++); }; },
				select: () => {
					if(!rows.length) { return; }
					const row = rows[Math.floor(rows.length / 2)];
					if(selectedTr) { selectedTr.classList.remove("danger"); }
					selectedTr = byId.get(row.id).tr;
					selectedTr.classList.add("danger");                               // O(1) — touch two nodes
				},
				swap: () => {
					if(rows.length <= 3) { return; }
					const a = rows, i = 1, j = rows.length - 2;
					const ti = byId.get(a[i].id).tr, tj = byId.get(a[j].id).tr;
					const after = tj.nextSibling;
					tbody.insertBefore(tj, ti);
					tbody.insertBefore(ti, after);
					const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
				},
				remove: () => {
					if(rows.length < 2) { return; }
					const row = rows[1];
					byId.get(row.id).tr.remove();
					byId.delete(row.id);
					rows = rows.filter((_, i) => i !== 1);
				},
				clear: () => { tbody.replaceChildren(); byId.clear(); rows = []; selectedTr = null; },
				count: () => root.querySelectorAll("tr").length
			};
		})();

		// ==================================================================
		// the suite: setup resets to a clean state; run is timed
		// ==================================================================
		const suite = (impl) => ({
			"create 1k":        { setup: () => impl.clear(),          run: () => impl.create(1000) },
			"create 10k":       { setup: () => impl.clear(),          run: () => impl.create(10000) },
			"replace all 1k":   { setup: () => impl.create(1000),     run: () => impl.create(1000) },      // zero key overlap
			"update every 10th":{ setup: () => impl.create(1000),     run: () => impl.update10th() },
			"select (10k)":     { setup: () => impl.create(10000),    run: () => impl.select() },
			"swap (10k)":       { setup: () => impl.create(10000),    run: () => impl.swap() },
			"remove (10k)":     { setup: () => impl.create(10000),    run: () => impl.remove() },
			"append 1k to 10k": { setup: () => impl.create(10000),    run: () => impl.append(1000) },
			"clear 10k":        { setup: () => impl.create(10000),    run: () => impl.clear() }
		});

		// Synchronous per-op cost. For a single-cell update the payload (one
		// text node) is trivial and paint latency is a fixed ~frame regardless
		// of framework — so paint-timing would hide the difference. What differs
		// from a virtual-DOM framework is the JS done BEFORE paint: qrp fires one
		// tracked effect and one textContent set (no diff, no component re-run).
		// Measure that, in nanoseconds per update, over many reps.
		// Time a prepared single-cell updater (refs already resolved) over many
		// reps; returns nanoseconds per update.
		const microPerOp = (impl, prepName, reps) => {
			impl.clear(); impl.create(10000);
			const update = impl[prepName]();
			for(let i = 0; i < 2000; i++) { update(); } // warm the JIT
			const t = performance.now();
			for(let i = 0; i < reps; i++) { update(); }
			const ms = performance.now() - t;
			impl.clear();
			return (ms / reps) * 1e6;
		};

		window.bench = {
			runAll: async () => {
				const out = {};
				const qSuite = suite(qrp);
				const vSuite = suite(vanilla);

				for(const name of Object.keys(qSuite)) {
					const q = await runBench(qSuite[name], { reps: 5, warmup: 2 });
					vanilla.clear(); qrp.clear();
					const v = await runBench(vSuite[name], { reps: 5, warmup: 2 });
					qrp.clear(); vanilla.clear();
					out[name] = { qrp: q, vanilla: v, ratio: Math.round((q / v) * 10) / 10 };
				}

				return out;
			},

			// The headline: synchronous cost of changing ONE cell in 10,000 rows.
			// qrp holds the node ref via the subscription (no lookup); vanilla is
			// measured both holding a direct ref (the floor) and having to find
			// the cell by querySelector (realistic when you don't keep a map).
			updateOneNs: () => {
				const reps = 20000;
				return {
					qrp_ns: Math.round(microPerOp(qrp, "prepUpdateOne", reps)),
					vanilla_directref_ns: Math.round(microPerOp(vanilla, "prepUpdateOne", reps)),
					vanilla_query_ns: Math.round(microPerOp(vanilla, "prepUpdateOneQuery", 5000)),
					reps
				};
			},

			// Prove "and nothing else": count the DOM mutations one cell-change
			// produces across the whole 10,000-row table. The Proxy set fires one
			// tracked effect that writes the ONE referenced text node — every
			// other node is untouched.
			mutationsForOne: () => {
				qrp.clear(); qrp.create(10000);
				const root = document.getElementById("qrp-root");
				const totalNodes = root.querySelectorAll("*").length;
				const obs = new MutationObserver(() => {});
				obs.observe(root, { subtree: true, childList: true, characterData: true, attributes: true });
				qrp.updateOne();
				const recs = obs.takeRecords();   // pending records, synchronously
				obs.disconnect();
				const touched = new Set();
				recs.forEach((m) => {
					touched.add(m.target);
					m.addedNodes.forEach((n) => touched.add(n));
					m.removedNodes.forEach((n) => touched.add(n));
				});
				qrp.clear();
				return { mutationRecords: recs.length, nodesTouched: touched.size, tableNodes: totalNodes };
			}
		};
	</script>
</body>
</html>
